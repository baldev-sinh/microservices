server:
  port: 8090

spring:
  application:
    name: loans
  profiles:
    active: prod
  datasource:
    url: jdbc:mysql://localhost:3307/loansdb
    username: root
    password: root
  jpa:
    show-sql: true
  sqL:
    init:
      mode: always

  config:
    import: optional:configserver:http://localhost:8071/

management:
  endpoints:
    web:
      exposure:
        include: "*"